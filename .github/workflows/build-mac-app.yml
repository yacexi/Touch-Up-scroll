name: Build macOS App

on:
  push:
    branches: [ "main", "master" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: List Schemes (Debug)
        run: xcodebuild -list -project "Touch Up.xcodeproj"

      - name: Build App
        run: |
          # 仅编译主 Scheme "Touch Up"，它通常会自动编译依赖的 Core 框架
          # 使用 -quiet 减少不必要的日志，只显示错误
          xcodebuild -project "Touch Up.xcodeproj" \
                     -scheme "Touch Up" \
                     -configuration Release \
                     -derivedDataPath BuildData \
                     CODE_SIGNING_ALLOWED=NO \
                     CODE_SIGNING_REQUIRED=NO \
                     clean build

      - name: Package App
        run: |
          # 查找生成的 .app 文件位置
          APP_PATH=$(find BuildData/Build/Products/Release -name "*.app" -maxdepth 1)
          echo "Found app at: $APP_PATH"
          zip -r Touch-Up-Mac.zip "$APP_PATH"

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: Touch-Up-Custom-Build
          path: Touch-Up-Mac.zip
