name: Build macOS App

on:
  push:
    branches: [ "main", "master" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest
    env:
      # 提前适配 Node.js 24 警告
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Select Xcode Version
        run: sudo xcode-select -s /Applications/Xcode.app

      - name: Build Touch Up Core Framework
        run: |
          # 该项目依赖于 Touch Up Core 框架，需先确保它被编译或作为依赖处理
          xcodebuild -project "Touch Up.xcodeproj" \
                     -scheme "Touch Up Core" \
                     -configuration Release \
                     -derivedDataPath BuildData \
                     CODE_SIGNING_ALLOWED=NO \
                     CODE_SIGNING_REQUIRED=NO \
                     CLEAN build

      - name: Build Main App
        run: |
          # 编译主应用
          xcodebuild -project "Touch Up.xcodeproj" \
                     -scheme "Touch Up" \
                     -configuration Release \
                     -derivedDataPath BuildData \
                     CODE_SIGNING_ALLOWED=NO \
                     CODE_SIGNING_REQUIRED=NO \
                     build

      - name: Package App
        run: |
          # 定位产物：注意 Touch-Up 的产物目录可能包含空格
          cd BuildData/Build/Products/Release
          # 移除可能存在的旧压缩包
          rm -f ../../../Touch-Up-Mac.zip
          zip -r ../../../Touch-Up-Mac.zip "Touch Up.app"

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: Touch-Up-Custom-Build
          path: Touch-Up-Mac.zip
