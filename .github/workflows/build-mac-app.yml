name: Build macOS App

on:
  push:
    branches: [ "main", "master" ] # 当你向主分支推送代码时触发
  pull_request:
    branches: [ "main", "master" ]
  workflow_dispatch: # 允许你在 GitHub 页面上手动点击运行

jobs:
  build:
    runs-on: macos-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Select Xcode Version
        run: sudo xcode-select -s /Applications/Xcode.app

      - name: Build App
        run: |
          # 使用 xcodebuild 编译项目
          # -scheme "Touch Up" 是项目中的构建方案名称
          # -configuration Release 编译正式版
          # CODE_SIGNING_ALLOWED=NO 绕过 Apple ID 签名（因为 GitHub 运行器没有你的私钥）
          xcodebuild -project "Touch Up.xcodeproj" \
                     -scheme "Touch Up" \
                     -configuration Release \
                     -derivedDataPath BuildData \
                     CODE_SIGNING_ALLOWED=NO \
                     CODE_SIGNING_REQUIRED=NO \
                     CLEAN

      - name: Package App
        run: |
          # 找到编译生成的 .app 文件并压缩
          cd BuildData/Build/Products/Release
          zip -r Touch-Up-Mac.zip "Touch Up.app"
          mv Touch-Up-Mac.zip ../../../

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: Touch-Up-App
          path: Touch-Up-Mac.zip
