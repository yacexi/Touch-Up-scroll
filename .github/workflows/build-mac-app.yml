name: Build macOS App

on:
  push:
    branches: [ "main", "master" ]
  workflow_dispatch: # 允许你手动点击按钮编译

jobs:
  build:
    runs-on: macos-latest
    env:
      # 适配 2026 年的 Node 24 要求
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Select Xcode Version
        run: sudo xcode-select -s /Applications/Xcode.app

      - name: Build Touch Up Core Framework
        run: |
          # 修复点：将 CLEAN 改为小写 clean
          xcodebuild -project "Touch Up.xcodeproj" \
                     -scheme "Touch Up Core" \
                     -configuration Release \
                     -derivedDataPath BuildData \
                     CODE_SIGNING_ALLOWED=NO \
                     CODE_SIGNING_REQUIRED=NO \
                     clean build

      - name: Build Main App
        run: |
          # 编译主程序
          xcodebuild -project "Touch Up.xcodeproj" \
                     -scheme "Touch Up" \
                     -configuration Release \
                     -derivedDataPath BuildData \
                     CODE_SIGNING_ALLOWED=NO \
                     CODE_SIGNING_REQUIRED=NO \
                     build

      - name: Package App
        run: |
          # 进入产物目录并打包
          cd BuildData/Build/Products/Release
          zip -r ../../../Touch-Up-Mac.zip "Touch Up.app"

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: Touch-Up-Custom-Build
          path: Touch-Up-Mac.zip
